name: scheduler-cron

# Hits /api/scheduler every 5 min. Vercel Hobby blocks cron schedules
# tighter than daily, so the scheduler trigger lives here instead.
# A failed run sends email to the repo owner automatically.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST /api/scheduler
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set."
            exit 1
          fi
          # Retries are safe: the scheduler dedupes notification sends via
          # compare-and-swap on game_states.notifications_sent.
          curl -fsS --max-time 60 --retry 3 --retry-all-errors --retry-delay 5 -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            https://4th-quarter-sooty.vercel.app/api/scheduler
